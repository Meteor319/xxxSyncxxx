<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro 效能整理助手 - 公司部署版</title>
    <!-- 引入核心資源 (CDN 確保在有網路的環境下運作正常) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 內建 SVG 圖標 (避免外部圖標庫載入失敗) ---
        const Icon = ({ name, className = "", size = 20 }) => {
            const icons = {
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></>,
                Circle: <circle cx="12" cy="12" r="10" />,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="14" y="3" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /></>,
                List: <><line x1="8" x2="21" y1="6" y2="6" /><line x1="8" x2="21" y1="12" y2="12" /><line x1="8" x2="21" y1="18" y2="18" /><circle cx="3" cy="6" r="1" /><circle cx="3" cy="12" r="1" /><circle cx="3" cy="18" r="1" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></>,
                Database: <><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" /></>,
                Search: <><circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="21" y2="16.65" /></>,
                Tag: <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z" />,
                Wand2: <><path d="m15 4 5 5" /><path d="m3 21 8-8" /><path d="m13 13 4-4" /><path d="m9 9 4-4" /></>,
                Sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /></>,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                PieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                Loader2: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            // --- 核心狀態 ---
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('todo_pro_v3') || '[]'));
            const [customTags, setCustomTags] = useState(() => JSON.parse(localStorage.getItem('tags_pro_v3') || '["工作", "生活", "學習", "健康"]'));
            
            const [inputValue, setInputValue] = useState('');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState('');
            const [selectedTag, setSelectedTag] = useState('全部');
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('matrix');
            const [showStats, setShowStats] = useState(false);
            const [showTagEditor, setShowTagEditor] = useState(false);
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [draggedTaskId, setDraggedTaskId] = useState(null);
            
            const fileInputRef = useRef(null);
            const apiKey = ""; // 在這裡填入你的 Gemini API Key

            const QUADRANTS = [
                { id: 'q1', title: '重要且緊急', icon: 'AlertCircle', color: 'bg-red-50 border-red-200', textColor: 'text-red-700' },
                { id: 'q2', title: '重要不緊急', icon: 'Star', color: 'bg-blue-50 border-blue-200', textColor: 'text-blue-700' },
                { id: 'q3', title: '不重要但緊急', icon: 'Clock', color: 'bg-orange-50 border-orange-200', textColor: 'text-orange-700' },
                { id: 'q4', title: '不重要不緊急', icon: 'List', color: 'bg-gray-50 border-gray-200', textColor: 'text-gray-700' },
            ];

            useEffect(() => { localStorage.setItem('todo_pro_v3', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('tags_pro_v3', JSON.stringify(customTags)); }, [customTags]);

            // --- AI 功能 ---
            const callGemini = async (prompt, systemPrompt = "") => {
                if(!apiKey) { alert("請先在程式碼中填入你的 Gemini API Key 才能使用 AI 功能。"); return null; }
                setIsAiLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const data = await response.json();
                    setIsAiLoading(false);
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { setIsAiLoading(false); return null; }
            };

            const handleAiSmartCategorize = async () => {
                const res = await callGemini(`任務內容：${inputValue}`, "只需回答 q1, q2, q3 或 q4。");
                if (res && ['q1','q2','q3','q4'].includes(res.trim().toLowerCase())) {
                    const q = res.trim().toLowerCase();
                    setTasks([{ id: Date.now(), text: inputValue, completed: false, result: '', quadrant: q, tag: customTags[0], startDate, endDate: endDate || '未設定' }, ...tasks]);
                    setInputValue('');
                }
            };

            // --- 拖曳與分類邏輯 ---
            const onDrop = (e, targetQuadrant) => {
                e.preventDefault();
                const id = parseInt(e.dataTransfer.getData('taskId'));
                setTasks(prev => prev.map(t => t.id === id ? { ...t, quadrant: targetQuadrant } : t));
                setDraggedTaskId(null);
            };

            const stats = useMemo(() => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.completed).length;
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
                return { total, completed, rate };
            }, [tasks]);

            const exportToCSV = () => {
                const headers = "\uFEFF任務內容,分類,重要度,開始日期,預計結束,狀態,成果記錄";
                const rows = tasks.map(t => `"${t.text}","${t.tag}","${t.quadrant}","${t.startDate}","${t.endDate}","${t.completed?'已完成':'進行中'}","${t.result.replace(/\n/g,' ')}"`).join("\n");
                const blob = new Blob([headers + "\n" + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `待辦清單_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const filteredList = tasks.filter(t => (selectedTag === '全部' || t.tag === selectedTag) && t.text.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-indigo-600 rounded-2xl shadow-lg text-white"><Icon name="ClipboardList" size={28} /></div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800">Pro 效能整理助手</h1>
                                <p className="text-slate-400 font-medium">拖曳、AI 與數據管理便攜版</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            {isAiLoading && <Icon name="Loader2" className="animate-spin text-indigo-600" />}
                            <button onClick={() => setShowReport(true)} className="p-2.5 bg-white border border-slate-200 rounded-xl shadow-sm text-slate-600"><Icon name="FileText" /></button>
                            <button onClick={() => setShowTagEditor(!showTagEditor)} className={`p-2.5 border rounded-xl shadow-sm transition-all ${showTagEditor ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600'}`}><Icon name="Settings" /></button>
                            <div className="flex bg-white rounded-xl p-1 border border-slate-200 ml-2">
                                <button onClick={() => setViewMode('matrix')} className={`px-4 py-2 rounded-lg font-bold ${viewMode === 'matrix' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>矩陣</button>
                                <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg font-bold ${viewMode === 'list' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>清單</button>
                            </div>
                        </div>
                    </header>

                    {/* 統計區域 */}
                    {showStats && (
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 animate-in">
                            <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                                <p className="text-slate-400 text-[10px] font-black uppercase">任務完成率</p>
                                <p className="text-3xl font-black text-indigo-600">{stats.rate}%</p>
                                <div className="absolute bottom-0 left-0 h-1 bg-indigo-500" style={{ width: `${stats.rate}%` }}></div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                                <div><p className="text-slate-400 text-[10px] font-black">完成項</p><p className="text-2xl font-black">{stats.completed}</p></div>
                                <div><p className="text-slate-400 text-[10px] font-black">總任務</p><p className="text-2xl font-black">{stats.total}</p></div>
                            </div>
                        </div>
                    )}

                    {/* 標籤管理 */}
                    {showTagEditor && (
                        <div className="mb-6 bg-slate-900 text-white p-6 rounded-3xl shadow-2xl animate-in">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold flex items-center gap-2"><Icon name="Tag" className="text-indigo-400" /> 標籤管理</h3>
                                <button onClick={() => setShowTagEditor(false)}><Icon name="X" /></button>
                            </div>
                            <div className="flex flex-wrap gap-2 mb-4">
                                {customTags.map(tag => (
                                    <div key={tag} className="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full">
                                        <span>{tag}</span>
                                        <button onClick={() => { if(customTags.length>1) setCustomTags(customTags.filter(t=>t!==tag)) }}><Icon name="X" size={14} /></button>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input type="text" value={newTagInput} onChange={e=>setNewTagInput(e.target.value)} placeholder="新標籤..." className="flex-grow bg-slate-800 p-2 rounded-xl" />
                                <button onClick={()=>{ if(newTagInput && !customTags.includes(newTagInput)){setCustomTags([...customTags, newTagInput]); setNewTagInput('');} }} className="px-6 bg-indigo-500 rounded-xl font-bold">新增</button>
                            </div>
                        </div>
                    )}

                    {/* 新增任務區 */}
                    <div className="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm mb-6 space-y-4">
                        <form onSubmit={(e)=>{ e.preventDefault(); if(!inputValue) return; setTasks([{id:Date.now(), text:inputValue, completed:false, result:'', quadrant:'q2', tag:customTags[0], startDate, endDate:endDate||'未設定'}, ...tasks]); setInputValue(''); }} className="flex flex-col md:flex-row gap-4">
                            <div className="flex-grow flex items-center gap-2">
                                <input type="text" value={inputValue} onChange={e=>setInputValue(e.target.value)} placeholder="今天要完成什麼目標？" className="flex-grow text-lg font-bold outline-none" />
                                <button type="button" onClick={handleAiSmartCategorize} className="p-2 bg-amber-50 text-amber-600 rounded-xl"><Icon name="Wand2" /></button>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-2xl">
                                <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="text-xs bg-transparent" />
                                <span>➔</span>
                                <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="text-xs bg-transparent" />
                            </div>
                            <button type="submit" className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-black">新增</button>
                        </form>
                    </div>

                    {/* 搜尋與過濾 */}
                    <div className="mb-6 flex flex-col md:flex-row gap-4">
                        <div className="relative flex-grow">
                            <Icon name="Search" className="absolute left-4 top-3 text-slate-300" />
                            <input type="text" placeholder="搜尋項目..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl" />
                        </div>
                        <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
                            <button onClick={()=>setSelectedTag('全部')} className={`px-4 py-2 rounded-xl text-xs font-bold ${selectedTag==='全部'?'bg-slate-900 text-white':'bg-white text-slate-400'}`}>全部</button>
                            {customTags.map(t=>(<button key={t} onClick={()=>setSelectedTag(t)} className={`px-4 py-2 rounded-xl text-xs font-bold ${selectedTag===t?'bg-indigo-600 text-white':'bg-white text-slate-400'}`}>{t}</button>))}
                        </div>
                    </div>

                    {/* 內容視圖 */}
                    {viewMode === 'matrix' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {QUADRANTS.map(q => {
                                const qTasks = tasks.filter(t => t.quadrant === q.id && !t.completed && (selectedTag==='全部' || t.tag===selectedTag) && t.text.toLowerCase().includes(searchQuery.toLowerCase()));
                                return (
                                    <div key={q.id} onDragOver={e=>e.preventDefault()} onDrop={e=>onDrop(e, q.id)} className={`flex flex-col min-h-[300px] rounded-3xl border-2 ${q.color} transition-all ${draggedTaskId?'border-dashed':''}`}>
                                        <div className="p-4 border-b border-inherit font-black flex items-center justify-between">
                                            <div className="flex items-center gap-2"><Icon name={q.icon} /> {q.title}</div>
                                            <span className="text-[10px] uppercase font-bold text-slate-400">{qTasks.length} 項</span>
                                        </div>
                                        <div className="p-4 space-y-3 flex-grow overflow-y-auto custom-scrollbar">
                                            {qTasks.map(task => (
                                                <div key={task.id} draggable onDragStart={e=>{setDraggedTaskId(task.id); e.dataTransfer.setData('taskId', task.id);}} className="bg-white p-4 rounded-2xl shadow-sm flex items-start gap-3 cursor-grab group">
                                                    <button onClick={()=>setTasks(tasks.map(t=>t.id===task.id?{...t, completed:true}:t))}><Icon name="Circle" className="text-slate-200" /></button>
                                                    <div className="flex-grow font-bold text-slate-700">{task.text}</div>
                                                    <button onClick={()=>setTasks(tasks.filter(t=>t.id!==task.id))} className="opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="text-slate-300" size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ) : (
                        <div className="bg-white rounded-3xl border border-slate-200 divide-y overflow-hidden shadow-sm">
                            {filteredList.map(task => (
                                <div key={task.id} className={`p-4 flex items-start gap-4 transition-all ${task.completed?'bg-indigo-50/20':''}`}>
                                    <button onClick={()=>setTasks(tasks.map(t=>t.id===task.id?{...t, completed:!t.completed}:t))}><Icon name={task.completed?"CheckCircle2":"Circle"} className={task.completed?"text-green-500":"text-slate-200"} size={24} /></button>
                                    <div className="flex-grow">
                                        <div className="flex items-center gap-3">
                                            <p className={`font-black ${task.completed?'text-indigo-700':'text-slate-700'}`}>{task.text}</p>
                                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold">#{task.tag}</span>
                                        </div>
                                        {task.completed && (
                                            <textarea value={task.result} onChange={e=>setTasks(tasks.map(t=>t.id===task.id?{...t, result:e.target.value}:t))} className="w-full mt-2 p-3 bg-white/50 rounded-xl text-xs italic outline-none" placeholder="寫下這次的收穫..." rows={2} />
                                        )}
                                    </div>
                                    <button onClick={()=>setTasks(tasks.filter(t=>t.id!==task.id))}><Icon name="Trash2" className="text-slate-200" /></button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* 數據管理按鈕 */}
                    <div className="mt-8 flex justify-center gap-6">
                        <button onClick={()=>setShowStats(!showStats)} className="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-bold transition-colors"><Icon name="PieChart" /> 統計報表</button>
                        <button onClick={()=>setShowExportMenu(!showExportMenu)} className="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-bold transition-colors"><Icon name="Database" /> 數據管理</button>
                    </div>

                    {showExportMenu && (
                        <div className="mt-4 bg-white p-4 rounded-2xl border border-slate-200 flex flex-wrap justify-center gap-4 animate-in">
                            <button onClick={()=>{ const blob = new Blob([JSON.stringify({tasks, tags:customTags})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'todo_backup.json'; a.click(); }} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold">儲存 JSON 備份</button>
                            <button onClick={exportToCSV} className="px-4 py-2 bg-green-50 text-green-600 rounded-lg text-xs font-bold">匯出 Excel (CSV)</button>
                            <button onClick={()=>fileInputRef.current.click()} className="px-4 py-2 bg-orange-50 text-orange-600 rounded-lg text-xs font-bold">讀取 JSON 備份</button>
                            <input type="file" ref={fileInputRef} className="hidden" onChange={e=>{ const reader = new FileReader(); reader.onload = ev => { const d = JSON.parse(ev.target.result); if(d.tasks) setTasks(d.tasks); if(d.tags) setCustomTags(d.tags); alert('資料匯入成功！'); }; reader.readAsText(e.target.files[0]); }} />
                        </div>
                    )}

                    {/* 報表彈窗 */}
                    {showReport && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-xl shadow-2xl flex flex-col max-h-[80vh]">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-black">一鍵產出成果週報</h3>
                                    <button onClick={()=>setShowReport(false)}><Icon name="X" /></button>
                                </div>
                                <textarea readOnly value={tasks.filter(t=>t.completed).map(t=>`【${t.tag}】${t.text}\n成果：${t.result||'未填'}\n-------------------`).join('\n') || "尚無完成事項"} className="w-full flex-grow p-4 bg-slate-50 rounded-2xl text-xs font-mono" />
                                <div className="mt-4 flex justify-end gap-3 font-bold">
                                    <button onClick={()=>setShowReport(false)} className="px-6 py-2 text-slate-500">關閉</button>
                                    <button onClick={()=>{ navigator.clipboard.writeText(tasks.filter(t=>t.completed).map(t=>`【${t.tag}】${t.text}\n成果：${t.result||'未填'}`).join('\n')); alert('已複製！'); }} className="px-6 py-2 bg-indigo-600 text-white rounded-xl">複製文字</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
