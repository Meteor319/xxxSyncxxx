<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro 效能整理助手 - 便攜版</title>
    <!-- 引入核心資源 (公司內網通常允許 CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 內建 SVG 圖標系統 (確保在公司環境 100% 呈現) ---
        const Icon = ({ name, className = "", size = 20 }) => {
            const icons = {
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></>,
                Circle: <circle cx="12" cy="12" r="10" />,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="14" y="3" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /></>,
                List: <><line x1="8" x2="21" y1="6" y2="6" /><line x1="8" x2="21" y1="12" y2="12" /><line x1="8" x2="21" y1="18" y2="18" /><circle cx="3" cy="6" r="1" /><circle cx="3" cy="12" r="1" /><circle cx="3" cy="18" r="1" /></>,
                AlertCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></>,
                Clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></>,
                Database: <><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" /></>,
                Search: <><circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="21" y2="16.65" /></>,
                Tag: <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z" />,
                Wand2: <><path d="m15 4 5 5" /><path d="m3 21 8-8" /><path d="m13 13 4-4" /><path d="m9 9 4-4" /></>,
                Sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" /></>,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72v.18a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            // --- 狀態初始化 ---
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('todo_pro_tasks_v3_final');
                return saved ? JSON.parse(saved) : [];
            });
            const [customTags, setCustomTags] = useState(() => {
                const saved = localStorage.getItem('todo_pro_tags_v3_final');
                return saved ? JSON.parse(saved) : ['工作', '生活', '學習', '健康'];
            });

            const [inputValue, setInputValue] = useState('');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState('');
            const [selectedTag, setSelectedTag] = useState('全部');
            const [searchQuery, setSearchQuery] = useState('');
            const [viewMode, setViewMode] = useState('matrix');
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [showStats, setShowStats] = useState(false); 
            const [showTagEditor, setShowTagEditor] = useState(false);
            const [newTagInput, setNewTagInput] = useState('');
            const [showReport, setShowReport] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [draggedTaskId, setDraggedTaskId] = useState(null);
            
            const fileInputRef = useRef(null);
            const apiKey = ""; // 部署後建議使用您自己的 Google Gemini API Key

            const QUADRANTS = [
                { id: 'q1', title: '重要且緊急', icon: 'AlertCircle', color: 'bg-red-50 border-red-200', textColor: 'text-red-700' },
                { id: 'q2', title: '重要不緊急', icon: 'Star', color: 'bg-blue-50 border-blue-200', textColor: 'text-blue-700' },
                { id: 'q3', title: '不重要但緊急', icon: 'Clock', color: 'bg-orange-50 border-orange-200', textColor: 'text-orange-700' },
                { id: 'q4', title: '不重要不緊急', icon: 'List', color: 'bg-gray-50 border-gray-200', textColor: 'text-gray-700' },
            ];

            useEffect(() => { localStorage.setItem('todo_pro_tasks_v3_final', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('todo_pro_tags_v3_final', JSON.stringify(customTags)); }, [customTags]);

            // --- Gemini AI 功能 ---
            const callGemini = async (prompt, systemPrompt = "") => {
                if(!apiKey) { alert("請先在程式碼中填入 Gemini API Key"); return null; }
                setIsAiLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const data = await response.json();
                    setIsAiLoading(false);
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { setIsAiLoading(false); return null; }
            };

            const handleAiSmartCategorize = async () => {
                const res = await callGemini(`任務：${inputValue}`, "回答 q1, q2, q3 或 q4。");
                if (res && ['q1','q2','q3','q4'].includes(res.trim().toLowerCase())) {
                    setTasks([{ id: Date.now(), text: inputValue, completed: false, result: '', quadrant: res.trim().toLowerCase(), tag: customTags[0], startDate, endDate: endDate || '未設定' }, ...tasks]);
                    setInputValue('');
                }
            };

            // --- 拖曳邏輯 ---
            const onDrop = (e, targetQuadrant) => {
                e.preventDefault();
                const id = parseInt(e.dataTransfer.getData('taskId'));
                setTasks(prev => prev.map(t => t.id === id ? { ...t, quadrant: targetQuadrant } : t));
                setDraggedTaskId(null);
            };

            // --- 數據與匯出 ---
            const stats = useMemo(() => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.completed).length;
                const qCount = QUADRANTS.reduce((acc, q) => { acc[q.id] = tasks.filter(t => t.quadrant === q.id && !t.completed).length; return acc; }, {});
                return { total, completed, rate: total > 0 ? Math.round((completed / total) * 100) : 0, qCount };
            }, [tasks]);

            const exportToCSV = () => {
                const headers = "\uFEFF任務內容,分類,重要度,開始,結束,狀態,成果";
                const rows = tasks.map(t => `"${t.text}","${t.tag}","${t.quadrant}","${t.startDate}","${t.endDate}","${t.completed?'完成':'進行中'}","${t.result.replace(/\n/g,' ')}"`).join("\n");
                const blob = new Blob([headers + "\n" + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "todo_export.csv";
                link.click();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 text-sm">
                    <div className="max-w-6xl mx-auto">
                        {/* Header */}
                        <header className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                                    <Icon name="ClipboardList" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">Pro 效能整理助手</h1>
                                    <p className="text-slate-400 font-medium">單文件便攜版 - 支援拖曳、AI 與 Excel 匯出</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setViewMode('matrix')} className={`px-4 py-2 rounded-lg font-bold ${viewMode === 'matrix' ? 'bg-slate-900 text-white' : 'bg-white text-slate-400'}`}>矩陣</button>
                                <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg font-bold ${viewMode === 'list' ? 'bg-slate-900 text-white' : 'bg-white text-slate-400'}`}>清單</button>
                            </div>
                        </header>

                        {/* 統計區域 */}
                        {showStats && (
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 animate-in">
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                    <p className="text-slate-400 text-[10px] font-black uppercase">完成率</p>
                                    <p className="text-2xl font-black text-indigo-600">{stats.rate}%</p>
                                </div>
                            </div>
                        )}

                        {/* 新增項目 */}
                        <div className="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm mb-6 space-y-4">
                            <form onSubmit={(e) => { e.preventDefault(); if(!inputValue) return; setTasks([{id:Date.now(), text:inputValue, completed:false, result:'', quadrant:'q2', tag:customTags[0], startDate, endDate:endDate||'未設定'}, ...tasks]); setInputValue(''); }} className="flex flex-col md:flex-row gap-4">
                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="接下來要做什麼？" className="flex-grow text-lg font-bold outline-none" />
                                <div className="flex items-center gap-3">
                                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="text-xs font-bold bg-slate-50 p-2 rounded-xl" />
                                    <button type="submit" className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-black">新增項目</button>
                                </div>
                            </form>
                        </div>

                        {/* 視圖切換 */}
                        {viewMode === 'matrix' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {QUADRANTS.map(q => {
                                    const qTasks = tasks.filter(t => t.quadrant === q.id && !t.completed);
                                    return (
                                        <div key={q.id} onDragOver={e => e.preventDefault()} onDrop={e => onDrop(e, q.id)} className={`flex flex-col min-h-[300px] rounded-3xl border-2 ${q.color} transition-all ${draggedTaskId ? 'border-dashed' : ''}`}>
                                            <div className="p-4 border-b border-inherit font-black flex items-center gap-2"><Icon name={q.icon} /> {q.title}</div>
                                            <div className="p-4 space-y-3 flex-grow overflow-y-auto custom-scrollbar">
                                                {qTasks.map(task => (
                                                    <div key={task.id} draggable onDragStart={e => { setDraggedTaskId(task.id); e.dataTransfer.setData('taskId', task.id); }} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-start gap-3 cursor-grab">
                                                        <button onClick={() => setTasks(tasks.map(t => t.id === task.id ? {...t, completed:true} : t))}><Icon name="Circle" className="text-slate-200" /></button>
                                                        <div className="flex-grow font-bold">{task.text}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl border border-slate-200 divide-y overflow-hidden shadow-sm">
                                {tasks.map(task => (
                                    <div key={task.id} className="p-4 flex items-start gap-4">
                                        <button onClick={() => setTasks(tasks.map(t => t.id === task.id ? {...t, completed: !t.completed} : t))}><Icon name={task.completed ? "CheckCircle2" : "Circle"} className={task.completed ? "text-green-500" : "text-slate-200"} /></button>
                                        <div className="flex-grow">
                                            <p className={`font-bold ${task.completed ? 'text-indigo-700' : ''}`}>{task.text}</p>
                                            {task.completed && <textarea value={task.result} onChange={e => setTasks(tasks.map(t => t.id === task.id ? {...t, result: e.target.value} : t))} className="w-full mt-2 p-2 bg-slate-50 text-xs italic rounded-lg" placeholder="成果記錄..." />}
                                        </div>
                                        <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))}><Icon name="Trash2" className="text-slate-300" /></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 底部管理 */}
                        <div className="mt-8 flex justify-center gap-6">
                            <button onClick={() => setShowStats(!showStats)} className="font-bold text-slate-400">統計</button>
                            <button onClick={() => setShowExportMenu(!showExportMenu)} className="font-bold text-indigo-600">數據管理</button>
                        </div>

                        {showExportMenu && (
                            <div className="mt-4 bg-white p-4 rounded-2xl border border-slate-200 flex flex-wrap justify-center gap-4 animate-in">
                                <button onClick={() => { const blob = new Blob([JSON.stringify({tasks, tags:customTags})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'todo_backup.json'; a.click(); }} className="text-indigo-600 font-bold underline">儲存 JSON 備份</button>
                                <button onClick={exportToCSV} className="text-green-600 font-bold underline">匯出 Excel (CSV)</button>
                                <button onClick={() => fileInputRef.current.click()} className="text-orange-600 font-bold underline">讀取 JSON 備份</button>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={e => { const reader = new FileReader(); reader.onload = ev => { const d = JSON.parse(ev.target.result); if(d.tasks) setTasks(d.tasks); }; reader.readAsText(e.target.files[0]); }} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
